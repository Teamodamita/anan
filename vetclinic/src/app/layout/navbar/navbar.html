<nav class="vc-navbar" [class.scrolled]="isScrolled">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center justify-content-between w-100">

      <a class="vc-brand d-flex align-items-center gap-2" href="/">
        <div class="vc-brand-icon">
          <i [class]="'bi ' + logoIcon"></i>
        </div>
        <span class="vc-brand-text">{{ brandName }}</span>
      </a>

      <ul class="vc-nav-links d-none d-lg-flex align-items-center gap-1 list-unstyled mb-0">
        <li *ngFor="let link of navLinks" class="vc-nav-item">
          <a class="vc-nav-link" (click)="navigateTo(link.route)">
            {{ link.label }}
            <i *ngIf="link.hasDropdown" class="bi bi-chevron-down vc-chevron"></i>
          </a>
        </li>
      </ul>

      <div class="d-none d-lg-flex align-items-center gap-2" *ngIf="!isLoggedIn">
        <button class="btn vc-btn-outline" (click)="navigateTo('/auth/login')" type="button">
          Iniciar sesión
        </button>
        <button class="btn vc-btn-primary" (click)="navigateTo('/auth/register')" type="button">
          Registrarse
        </button>
      </div>

      <div class="d-none d-lg-flex align-items-center gap-2" *ngIf="isLoggedIn">
        <span class="vc-user-greeting">
          <i class="bi bi-person-circle me-1"></i>{{ userName }}
        </span>
        <button class="btn vc-btn-outline" (click)="goToProfile()" type="button">
          Mi perfil
        </button>
        <button class="btn vc-btn-danger" (click)="logout()" type="button">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>

      <button
        class="vc-hamburger d-flex d-lg-none"
        (click)="toggleMenu()"
        type="button"
        [attr.aria-expanded]="isMenuOpen"
        aria-label="Menú"
      >
        <i [class]="isMenuOpen ? 'bi bi-x-lg' : 'bi bi-list'"></i>
      </button>
    </div>

    <div class="vc-mobile-menu" [class.open]="isMenuOpen">
      <ul class="list-unstyled mb-3">
        <li *ngFor="let link of navLinks">
          <a class="vc-mobile-link" (click)="navigateTo(link.route)">{{ link.label }}</a>
        </li>
      </ul>
      <div class="d-flex flex-column gap-2" *ngIf="!isLoggedIn">
        <button class="btn vc-btn-outline w-100" (click)="navigateTo('/auth/login')">Iniciar sesión</button>
        <button class="btn vc-btn-primary w-100" (click)="navigateTo('/auth/register')">Registrarse</button>
      </div>
      <div class="d-flex flex-column gap-2" *ngIf="isLoggedIn">
        <button class="btn vc-btn-outline w-100" (click)="goToProfile()">Mi perfil</button>
        <button class="btn vc-btn-danger w-100" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button>
      </div>
    </div>

  </div>
</nav>
